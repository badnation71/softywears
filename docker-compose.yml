version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stepstyle_db
    environment:
      POSTGRES_USER: ${DB_USER:-stepstyle}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stepstyle123}
      POSTGRES_DB: ${DB_NAME:-softywears}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-stepstyle}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stepstyle_network

  redis:
    image: redis:7-alpine
    container_name: stepstyle_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stepstyle_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stepstyle_api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-stepstyle}:${DB_PASSWORD:-stepstyle123}@postgres:5432/${DB_NAME:-softywears}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET}
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - stepstyle_network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stepstyle_web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - stepstyle_network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  stepstyle_network:
    driver: bridge
